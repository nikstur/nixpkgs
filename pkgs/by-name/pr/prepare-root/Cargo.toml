[package]
name = "prepare-root"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.97"
sysinfo = { version = "0.32", default-features = false, features = [ "disk" ]}

[profile.release]
opt-level = "s"
panic = "abort"
lto = true
strip = true

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = { level = "deny" }
pedantic = { level = "deny" }
missing_errors_doc = { level = "allow", priority = 1 }
